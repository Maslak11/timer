name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (skip native builds)
        run: npm ci --ignore-scripts

      # ── grandiose v0.0.4 is self-contained (bundles its own NDI SDK headers
      # and Processing.NDI.Lib.x64.lib / .dll). No external NDI SDK needed.
      # We patch binding.gyp to disable MSVC strict-string mode (/Zc:strictStrings-)
      # which would otherwise reject const-char* ↔ char* implicit conversions,
      # then rebuild for the exact Electron ABI used by this project.
      - name: Patch grandiose binding.gyp for MSVC compatibility
        shell: pwsh
        run: |
          $gyp = "node_modules\grandiose\binding.gyp"
          $content = Get-Content $gyp -Raw
          # Insert msvs_settings block after "include_dirs" line
          $patch = @'
      "conditions": [["OS=='win'", {"msvs_settings": {"VCCLCompilerTool": {"AdditionalOptions": ["/Zc:strictStrings-"]}}}]],
'@
          $content = $content -replace '("include_dirs".*?\],)', "`$1`n      $patch"
          Set-Content $gyp $content
          Write-Host "✅ binding.gyp patched"

      - name: Rebuild grandiose for Electron
        shell: pwsh
        run: npx @electron/rebuild --module grandiose
        env:
          GYP_MSVS_TOOLSET: v143

      - name: Run remaining install scripts
        run: npm rebuild --ignore-optional

      - name: Build
        run: npm run build

      - name: Package Windows installer (unsigned)
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload unsigned installer artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: StageTimer-unsigned
          path: dist/*.exe
          if-no-files-found: error

      # ── SignPath code signing ─────────────────────────────────────────────
      # Requires secrets: SIGNPATH_API_TOKEN, SIGNPATH_ORGANIZATION_ID
      # Apply for free Open Source plan at: https://about.signpath.io/product/open-source
      # Enable by adding repository variable: SIGNPATH_ENABLED = true
      - name: Sign with SignPath
        id: signpath
        if: vars.SIGNPATH_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          api-token:                  '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id:            '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug:               'stagetimer'
          signing-policy-slug:        'release-signing'
          artifact-configuration-slug: 'windows-installer'
          github-artifact-id:         '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion:        true
          output-artifact-directory:  'dist-signed'
        continue-on-error: true

      - name: Use signed installer if available
        shell: bash
        run: |
          if ls dist-signed/*.exe 2>/dev/null; then
            echo "✅ Using signed installer"
            cp dist-signed/*.exe dist/
          else
            echo "⚠️  SignPath not configured or signing failed — using unsigned installer"
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageTimer-Windows
          path: dist/*.exe
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-web:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy web panel to FTP
        run: node scripts/deploy-web.js
        env:
          FTP_USER: zaive4_timermat
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_HOST: maslak.ftp.dhosting.pl
          DB_HOST:  ${{ secrets.DB_HOST }}
          DB_NAME:  ${{ secrets.DB_NAME }}
          DB_USER:  ${{ secrets.DB_USER }}
          DB_PASS:  ${{ secrets.DB_PASS }}
