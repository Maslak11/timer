name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── NDI SDK — needed to compile @julusian/grandiose native module ────────
      # The NDI runtime DLL (Processing.NDI.Lib.x64.dll) is already committed
      # to resources/ndi/ and bundled next to the .exe via electron-builder
      # extraFiles. This step only downloads the SDK dev headers/libs needed
      # to compile the native Node.js addon for Electron 33.
      # If the download fails the build continues — NDI button will show
      # "brak SDK" but the rest of the app works normally.
      - name: Download & install NDI 6 SDK (for grandiose native module)
        id: ndi
        shell: pwsh
        continue-on-error: true
        run: |
          $url = if ($env:NDI_SDK_URL) { $env:NDI_SDK_URL } `
                 else { "https://downloads.ndi.tv/SDK/NDI_SDK/NDI%206%20SDK%20for%20Windows.exe" }
          Write-Host "Downloading NDI 6 SDK from: $url"
          Invoke-WebRequest -Uri $url -OutFile "ndi_installer.exe" -UseBasicParsing -TimeoutSec 180
          Start-Process -Wait -FilePath ".\ndi_installer.exe" -ArgumentList "/S"
          if (Test-Path "C:\Program Files\NDI\NDI 6 SDK") {
            Write-Host "✅ NDI 6 SDK installed at: C:\Program Files\NDI\NDI 6 SDK"
            "NDI_SDK_OK=true" | Out-File $env:GITHUB_ENV -Append
          } else {
            Write-Warning "NDI SDK not found after install — grandiose will not be compiled"
          }
        env:
          NDI_SDK_URL: ${{ secrets.NDI_SDK_URL }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package Windows installer (unsigned)
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Point @julusian/grandiose binding.gyp to the NDI 6 SDK
          # NDI_SDK_V5_DIR also set to NDI 6 path (API-compatible, covers older binding.gyp)
          NDI_SDK_V5_DIR: C:\Program Files\NDI\NDI 6 SDK
          NDI_SDK_V6_DIR: C:\Program Files\NDI\NDI 6 SDK

      - name: Upload unsigned installer artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: StageTimer-unsigned
          path: dist/*.exe
          if-no-files-found: error

      # ── SignPath code signing ─────────────────────────────────────────────
      # Requires secrets: SIGNPATH_API_TOKEN, SIGNPATH_ORGANIZATION_ID
      # Apply for free Open Source plan at: https://about.signpath.io/product/open-source
      # Enable by adding repository variable: SIGNPATH_ENABLED = true
      - name: Sign with SignPath
        id: signpath
        if: vars.SIGNPATH_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          api-token:                  '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id:            '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug:               'stagetimer'
          signing-policy-slug:        'release-signing'
          artifact-configuration-slug: 'windows-installer'
          github-artifact-id:         '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion:        true
          output-artifact-directory:  'dist-signed'
        continue-on-error: true

      - name: Use signed installer if available
        shell: bash
        run: |
          if ls dist-signed/*.exe 2>/dev/null; then
            echo "✅ Using signed installer"
            cp dist-signed/*.exe dist/
          else
            echo "⚠️  SignPath not configured or signing failed — using unsigned installer"
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageTimer-Windows
          path: dist/*.exe
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-web:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy web panel to FTP
        run: node scripts/deploy-web.js
        env:
          FTP_USER: zaive4_timermat
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_HOST: maslak.ftp.dhosting.pl
          DB_HOST:  ${{ secrets.DB_HOST }}
          DB_NAME:  ${{ secrets.DB_NAME }}
          DB_USER:  ${{ secrets.DB_USER }}
          DB_PASS:  ${{ secrets.DB_PASS }}
