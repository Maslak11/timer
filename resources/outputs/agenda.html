<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>StageTimer — Agenda</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#0f0f0f;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;user-select:none}
    .layout{display:flex;flex-direction:column;height:100vh;padding:20px;gap:14px}
    .header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .logo{font-size:13px;color:#555;font-weight:600}
    .room-name{font-size:14px;font-weight:700}
    .clock{font-size:13px;color:#999;font-variant-numeric:tabular-nums}
    .agenda-table{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
    .agenda-row{display:grid;grid-template-columns:60px 90px 90px 1fr 80px;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;border:1px solid #222;background:#1a1a1a;font-size:14px;transition:background 0.15s}
    .agenda-row.active{background:#2a1a1a;border-color:#e53935}
    .agenda-row.done{opacity:0.45}
    .col-num{font-size:12px;color:#555;text-align:center}
    .col-start{font-size:12px;color:#999;font-variant-numeric:tabular-nums}
    .col-dur{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;color:#e8e8e8}
    .col-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .col-status{text-align:right}
    .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:0.04em}
    .badge-live{background:#e53935;color:#fff}
    .badge-next{background:#333;color:#999}
    .badge-done{background:#1a1a1a;color:#444}
    .progress-mini{height:3px;background:#252525;border-radius:2px;overflow:hidden;margin-top:4px;grid-column:1/-1}
    .progress-mini-fill{height:100%;background:#e53935;transition:width 0.1s linear}
    .footer{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;font-size:11px;color:#555}
    .agenda-row-wrap{display:flex;flex-direction:column}
  </style>
</head>
<body>
<div class="layout">
  <div class="header">
    <div class="logo">⏱ StageTimer · Agenda</div>
    <div class="room-name" id="room-name">Room</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
  <div class="agenda-table" id="agenda-table"></div>
  <div class="footer">
    <span id="status">Connecting...</span>
    <span id="total-time"></span>
  </div>
</div>

<script>
let currentState=null
function fmt(sec){const abs=Math.abs(sec);const h=Math.floor(abs/3600),m=Math.floor((abs%3600)/60),s=Math.floor(abs%60);if(h>0)return h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function render(state){
  currentState=state
  document.getElementById('room-name').textContent=state.name
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB',{timeZone:state.timezone,hour12:false})
  const now=new Date()
  let offset=0
  const rows=state.timers.map((t,i)=>{
    const isActive=i===state.activeTimerIndex
    const isDone=i<state.activeTimerIndex
    const startTime=new Date(now.getTime()+offset*1000)
    const startStr=startTime.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',timeZone:state.timezone,hour12:false})
    const progress=isActive&&t.duration>0?Math.min(t.elapsed/t.duration,1)*100:0
    offset+=t.duration
    const badge=isActive?'<span class="badge badge-live">LIVE</span>':isDone?'<span class="badge badge-done">DONE</span>':'<span class="badge badge-next">NEXT</span>'
    return `<div class="agenda-row-wrap">
      <div class="agenda-row${isActive?' active':''}${isDone?' done':''}">
        <div class="col-num">${i+1}</div>
        <div class="col-start">${startStr}</div>
        <div class="col-dur">${fmt(t.duration)}</div>
        <div class="col-name">${t.name}</div>
        <div class="col-status">${badge}</div>
      </div>
      ${isActive?`<div style="height:3px;background:#252525;border-radius:2px;overflow:hidden;margin:0 0 2px"><div style="height:100%;width:${progress}%;background:#e53935;transition:width 0.1s linear"></div></div>`:''}
    </div>`
  }).join('')
  document.getElementById('agenda-table').innerHTML=rows
  const total=state.timers.reduce((s,t)=>s+t.duration,0)
  document.getElementById('total-time').textContent='Total: '+fmt(total)
  document.getElementById('status').textContent='Connected'
}
setInterval(()=>{if(currentState){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB',{timeZone:currentState.timezone||'UTC',hour12:false})}},1000)
</script>
<script src="/shared/relay-client.js"></script>
<script src="/shared/socket-client.js"></script>
<script>window.onTimerState=render</script>
</body>
</html>
