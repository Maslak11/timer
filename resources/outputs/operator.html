<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>StageTimer — Operator</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#0f0f0f;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;user-select:none}
    .layout{display:flex;flex-direction:column;height:100vh;padding:16px;gap:12px}
    .header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .logo{font-size:13px;color:#555;font-weight:600}
    .clock{font-size:13px;color:#999}
    .timer-block{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;border-radius:12px;padding:20px;min-height:0}
    .timer-label{font-size:13px;color:#999;margin-bottom:8px;font-weight:500}
    .timer-main{font-size:min(20vw,18vh);font-weight:800;letter-spacing:-2px;line-height:1;font-variant-numeric:tabular-nums;transition:color 0.3s}
    .timer-main.overtime{color:#e53935}
    .progress-bar{width:100%;height:6px;background:#252525;border-radius:3px;overflow:hidden;margin-top:12px}
    .progress-fill{height:100%;background:#4caf50;transition:width 0.1s linear,background 0.3s}
    .message-bar{background:#1a1a1a;border-radius:8px;padding:10px 14px;font-size:14px;min-height:42px;display:flex;align-items:center;flex-shrink:0}
    .controls{display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0}
    .btn{display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:16px;cursor:pointer;border:none;font-family:inherit;transition:background 0.15s}
    .btn-ghost{background:#252525;color:#e8e8e8;width:48px;height:48px}
    .btn-ghost:hover{background:#333}
    .btn-main{background:#333;color:#fff;width:60px;height:60px;font-size:22px}
    .btn-main:hover{background:#e53935}
    .btn-adj{background:#1a1a1a;color:#999;padding:0 16px;height:40px;font-size:13px;border-radius:6px;border:none;cursor:pointer}
    .btn-adj:hover{background:#252525;color:#fff}
    .next-up{background:#1a1a1a;border-radius:8px;padding:8px 14px;flex-shrink:0}
    .next-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
    .next-list{display:flex;flex-direction:column;gap:4px}
    .next-item{display:flex;justify-content:space-between;font-size:13px;color:#999}
    .next-item.active{color:#e8e8e8;font-weight:600}
    .status-bar{display:flex;justify-content:space-between;font-size:11px;color:#555;flex-shrink:0}
  </style>
</head>
<body>
<div class="layout">
  <div class="header">
    <div class="logo">⏱ StageTimer · Operator</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>

  <div class="timer-block">
    <div class="timer-label" id="timer-name">—</div>
    <div class="timer-main" id="main-time">--:--</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="message-bar" id="message-bar" style="color:#555">No active message</div>

  <div class="controls">
    <button class="btn-adj" onclick="cmd('adjust',{seconds:-60})">-1m</button>
    <button class="btn btn-ghost" onclick="cmd('prev')" title="Previous">⏮</button>
    <button class="btn btn-main" id="play-btn" onclick="togglePlay()">▶</button>
    <button class="btn btn-ghost" onclick="cmd('next')" title="Next">⏭</button>
    <button class="btn-adj" onclick="cmd('adjust',{seconds:60})">+1m</button>
  </div>

  <div class="next-up">
    <div class="next-label">Timers</div>
    <div class="next-list" id="timer-list"></div>
  </div>

  <div class="status-bar">
    <span id="status">Connecting...</span>
    <span id="connections">0 connections</span>
  </div>
</div>

<script>
let currentState = null
function fmt(sec){const abs=Math.abs(sec);const h=Math.floor(abs/3600),m=Math.floor((abs%3600)/60),s=Math.floor(abs%60);if(h>0)return h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function cmd(action,data){if(window.sendCommand)window.sendCommand(action,data||{})}
function togglePlay(){if(!currentState)return;const t=currentState.timers[currentState.activeTimerIndex];if(!t)return;t.state==='running'?cmd('pause'):cmd('start')}
function render(state){
  currentState=state
  const timer=state.timers[state.activeTimerIndex]
  const now=new Date()
  document.getElementById('clock').textContent=now.toLocaleTimeString('en-GB',{timeZone:state.timezone,hour12:false})
  if(!timer)return
  const remaining=timer.type==='countdown'?timer.duration-timer.elapsed:timer.elapsed
  const overtime=timer.type==='countdown'&&timer.elapsed>timer.duration
  const progress=timer.duration>0?Math.min(timer.elapsed/timer.duration,1):0
  const el=document.getElementById('main-time')
  el.textContent=(overtime?'+':'')+fmt(Math.abs(remaining))
  el.className='timer-main'+(overtime?' overtime':'')
  const barColor=overtime||Math.abs(remaining)<60?'#e53935':Math.abs(remaining)<300?'#ff9800':'#4caf50'
  const pf=document.getElementById('progress-fill')
  pf.style.width=(progress*100)+'%';pf.style.background=barColor
  document.getElementById('timer-name').textContent=timer.name
  document.getElementById('play-btn').textContent=timer.state==='running'?'⏸':'▶'
  const msg=state.messages.find(m=>m.visible)
  const mb=document.getElementById('message-bar')
  if(msg){mb.textContent=msg.text;mb.style.color=msg.color==='white'?'#e8e8e8':msg.color;mb.style.fontWeight=msg.bold?700:400}
  else{mb.textContent='No active message';mb.style.color='#555';mb.style.fontWeight=400}
  const tl=document.getElementById('timer-list')
  tl.innerHTML=state.timers.slice(0,5).map((t,i)=>`<div class="next-item${i===state.activeTimerIndex?' active':''}"><span>${t.name}</span><span>${fmt(t.duration)}</span></div>`).join('')
  document.getElementById('status').textContent='Connected'
}
setInterval(()=>{if(currentState){const now=new Date();document.getElementById('clock').textContent=now.toLocaleTimeString('en-GB',{timeZone:currentState.timezone||'UTC',hour12:false})}},1000)
</script>
<script src="/shared/socket-client.js"></script>
<script>window.onTimerState=render</script>
</body>
</html>
