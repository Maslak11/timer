<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>StageTimer — Viewer</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;user-select:none}
    #app{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
    #logo{position:absolute;top:16px;left:20px;height:28px;opacity:0.35}
    #label{position:absolute;top:20px;right:20px;font-size:13px;font-weight:600;color:#4caf50}
    #live-dot{position:absolute;top:22px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2)}
    #live-dot.live{background:#e53935;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    #main-time{font-size:min(25vw,22vh);font-weight:800;letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums;transition:color 0.3s}
    #main-time.overtime{color:#e53935}
    #message{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);font-size:4vh;font-weight:500;text-align:center;padding:0 40px;white-space:pre-wrap;opacity:0;transition:opacity 0.3s}
    #message.visible{opacity:1}
    #progress-bar{position:absolute;bottom:40px;left:40px;right:40px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
    #progress-fill{height:100%;width:0%;background:#4caf50;transition:width 0.1s linear,background 0.3s}
    #color-bar{position:absolute;bottom:0;left:0;right:0;height:12px;display:flex}
    #color-bar div{flex:1}
    #blackout{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity 0.2s;z-index:100}
    #blackout.on{opacity:1;pointer-events:all}
    #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:99}
    #flash.on{animation:flash-anim 0.5s infinite}
    @keyframes flash-anim{0%,100%{opacity:0}50%{opacity:0.8}}
    #status{position:absolute;bottom:60px;right:20px;font-size:11px;color:rgba(255,255,255,0.2)}
  </style>
</head>
<body>
<div id="blackout"></div>
<div id="flash"></div>
<div id="app">
  <img id="logo" src="shared/logo.svg" alt="matlak.stream"/>
  <div id="label"></div>
  <div id="live-dot"></div>
  <div id="main-time">--:--</div>
  <div id="message"></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="color-bar">
    <div style="background:#4caf50;flex:1"></div>
    <div style="background:#ff9800;flex:0.4"></div>
    <div style="background:#e53935;flex:0.2"></div>
  </div>
  <div id="status">Connecting...</div>
</div>
<script>
function fmt(sec) {
  const abs = Math.abs(sec)
  const h = Math.floor(abs/3600), m = Math.floor((abs%3600)/60), s = Math.floor(abs%60)
  if(h>0) return h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')
}
function render(state) {
  const timer = state.timers[state.activeTimerIndex]
  document.getElementById('blackout').className = state.blackout ? 'on' : ''
  document.getElementById('flash').className = state.flash ? 'on' : ''
  if(!timer) return
  const remaining = timer.type==='countdown' ? timer.duration - timer.elapsed : timer.elapsed
  const overtime = timer.type==='countdown' && timer.elapsed > timer.duration
  const progress = timer.duration>0 ? Math.min(timer.elapsed/timer.duration,1) : 0
  const el = document.getElementById('main-time')
  el.textContent = (overtime ? '+' : '') + fmt(Math.abs(remaining))
  el.className = overtime ? 'overtime' : ''
  const barColor = overtime||Math.abs(remaining)<60 ? '#e53935' : Math.abs(remaining)<300 ? '#ff9800' : '#4caf50'
  document.getElementById('progress-fill').style.width = (progress*100)+'%'
  document.getElementById('progress-fill').style.background = barColor
  document.getElementById('label').textContent = timer.name
  document.getElementById('live-dot').className = timer.state==='running' ? 'live' : ''
  const msg = state.messages.find(m=>m.visible)
  const msgEl = document.getElementById('message')
  if(msg) {
    msgEl.textContent = msg.text
    msgEl.style.color = msg.color==='white'?'#e8e8e8':msg.color
    msgEl.style.fontWeight = msg.bold?700:400
    msgEl.className = 'visible'
  } else {
    msgEl.className = ''
  }
  document.getElementById('status').textContent = 'Connected'
}
</script>
<script src="shared/relay-client.js"></script>
<script src="shared/socket-client.js"></script>
<script>
window.onTimerState = render
document.getElementById('status').textContent = 'Connecting...'
</script>
</body>
</html>
